<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hemorrhoids - The Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #1a0033 0%, #2d0052 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #fff;
      overflow: hidden;
    }

    #gameContainer {
      position: relative;
      width: 100%;
      height: 100vh;
      max-width: 100%;
    }

    #gameCanvas {
      display: block;
      margin: 0 auto;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #0a0a1a 0%, #000 100%);
      touch-action: none;
    }

    #uiOverlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-size: 18px;
      pointer-events: none;
      font-weight: bold;
    }

    .ui-section {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .ui-label {
      font-size: 14px;
      opacity: 0.7;
    }

    .ui-value {
      font-size: 24px;
    }

    #powerUpDisplay {
      position: absolute;
      top: 80px;
      left: 20px;
      display: flex;
      gap: 10px;
      pointer-events: none;
    }

    .power-up-indicator {
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid #00ff88;
      border-radius: 5px;
      padding: 8px 12px;
      font-size: 14px;
      min-width: 120px;
    }

    .power-up-indicator.active {
      border-color: #ff00ff;
      background: rgba(255, 0, 255, 0.2);
    }

    #menuOverlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 30px;
      z-index: 100;
      pointer-events: auto;
    }

    #menuOverlay.hidden {
      display: none;
    }

    #gameOverOverlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      z-index: 99;
      pointer-events: auto;
    }

    #gameOverOverlay.hidden {
      display: none;
    }

    h1 {
      font-size: 72px;
      color: #ff00ff;
      text-shadow: 0 0 10px #ff00ff;
      margin-bottom: 20px;
      text-align: center;
    }

    h2 {
      font-size: 48px;
      color: #00ff88;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 24px;
      color: #00ff88;
      margin-bottom: 30px;
      text-align: center;
      opacity: 0.8;
    }

    button {
      padding: 12px 30px;
      font-size: 18px;
      background: linear-gradient(135deg, #ff00ff, #00ff88);
      border: none;
      color: #000;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s, box-shadow 0.2s;
      pointer-events: auto;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(255, 0, 255, 0.8);
    }

    button:active {
      transform: scale(0.95);
    }

    .top-scores {
      color: #00ff88;
      font-size: 14px;
      margin-top: 20px;
      text-align: center;
      max-width: 400px;
    }

    .score-entry {
      padding: 5px 0;
      opacity: 0.8;
    }

    #leaderboardModal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.95);
      border: 2px solid #ff00ff;
      border-radius: 10px;
      padding: 30px;
      max-height: 80vh;
      overflow-y: auto;
      width: 90%;
      max-width: 500px;
      z-index: 200;
      box-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
    }

    #leaderboardModal.hidden {
      display: none;
    }

    #leaderboardModal h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .leaderboard-entry {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid rgba(255, 0, 255, 0.2);
      font-size: 16px;
    }

    .leaderboard-rank {
      color: #ff00ff;
      font-weight: bold;
      min-width: 30px;
    }

    .leaderboard-close {
      margin-top: 20px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    #playerNameInput {
      padding: 10px;
      font-size: 18px;
      border: 2px solid #00ff88;
      background: #1a0033;
      color: #fff;
      border-radius: 5px;
      width: 100%;
      max-width: 300px;
      margin: 10px 0;
      text-align: center;
    }

    .game-over-stats {
      color: #00ff88;
      font-size: 18px;
      margin: 20px 0;
      text-align: center;
    }

    .game-over-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .hint-text {
      font-size: 14px;
      color: #00ff88;
      opacity: 0.6;
      margin-top: 20px;
      text-align: center;
    }

    #muteButton {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 8px 16px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid #00ff88;
      color: #fff;
      z-index: 50;
      pointer-events: auto;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 48px;
      }

      h2 {
        font-size: 32px;
      }

      .subtitle {
        font-size: 18px;
      }

      button {
        padding: 10px 20px;
        font-size: 16px;
      }

      #uiOverlay {
        font-size: 14px;
        padding: 10px;
      }

      .ui-value {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>

    <button id="muteButton">🔊 Sound ON</button>

    <div id="uiOverlay">
      <div class="ui-section">
        <span class="ui-label">SCORE</span>
        <span class="ui-value" id="scoreDisplay">0</span>
      </div>
      <div class="ui-section">
        <span class="ui-label">LIVES</span>
        <span class="ui-value" id="livesDisplay">3</span>
      </div>
      <div class="ui-section">
        <span class="ui-label">WAVE</span>
        <span class="ui-value" id="waveDisplay">1</span>
      </div>
    </div>

    <div id="powerUpDisplay"></div>

    <div id="menuOverlay">
      <h1>HEMORRHOIDS</h1>
      <p class="subtitle">Tactical Ointment Warfare</p>
      <button id="startButton">START GAME</button>
      <button id="leaderboardButtonMenu">VIEW LEADERBOARD</button>
      <div class="top-scores" id="topScoresMenu"></div>
      <div class="hint-text">Mouse to aim • Arrow Keys or WASD to move • Space to shoot • P to pause</div>
    </div>

    <div id="gameOverOverlay" class="hidden">
      <h2>GAME OVER</h2>
      <div class="game-over-stats">
        <div>Final Score: <span id="finalScore">0</span></div>
        <div>Rank: <span id="finalRank">--</span></div>
      </div>
      <div>
        <p>Enter your name to save score:</p>
        <input type="text" id="playerNameInput" maxlength="20" placeholder="Player Name">
        <button id="submitScoreButton">SAVE SCORE</button>
      </div>
      <div class="game-over-buttons">
        <button id="playAgainButton">PLAY AGAIN</button>
        <button id="leaderboardButtonGameOver">VIEW LEADERBOARD</button>
        <button id="menuButton">MENU</button>
      </div>
    </div>

    <div id="leaderboardModal" class="hidden">
      <h2>TOP 10 SCORES</h2>
      <div id="leaderboardList"></div>
      <button id="leaderboardCloseButton" class="leaderboard-close">CLOSE</button>
    </div>
  </div>

  <script>
    // ============= GAME STATE =============
    const gameState = {
      mode: 'menu', // menu, playing, paused, gameOver
      score: 0,
      lives: 3,
      wave: 1,
      initialWave: 1,
      asteroidCount: 4,
      entities: [],
      projectiles: [],
      particles: [],
      powerUps: [],
      ship: null,
      ufo: null,
      ufoSpawnCounter: 0,
      ufoSpawnRate: 500,
      activePowerUps: {},
      gameTime: 0,
      lastScore: 0,
    };

    // ============= CANVAS SETUP =============
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });

    function resizeCanvas() {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 600;

    // ============= INPUT HANDLER =============
    const keys = {};
    let mousePos = { x: 0, y: 0 };
    let mouseOverCanvas = false;

    window.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;
      initAudio();
      if (e.key === ' ') {
        e.preventDefault();
        if (gameState.mode === 'playing' && gameState.ship) {
          gameState.ship.fire();
        }
      }
      if (e.key === 'p' || e.key === 'P') {
        if (gameState.mode === 'playing') {
          gameState.mode = 'paused';
        } else if (gameState.mode === 'paused') {
          gameState.mode = 'playing';
        }
      }
      if (e.key === 'Escape') {
        if (gameState.mode === 'playing' || gameState.mode === 'paused') {
          showMenu();
        }
      }
    });
    window.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    // Mouse control for ship rotation
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const canvasX = e.clientX - rect.left;
      const canvasY = e.clientY - rect.top;

      // Convert to logical game coordinates
      const scaleX = canvas.width / CANVAS_WIDTH;
      const scaleY = canvas.height / CANVAS_HEIGHT;
      const scale = Math.min(scaleX, scaleY);

      mousePos.x = (canvasX / scale - (canvas.width / scale - CANVAS_WIDTH) / 2) / scale * canvas.width / (canvas.width / scale);
      mousePos.y = (canvasY / scale - (canvas.height / scale - CANVAS_HEIGHT) / 2) / scale * canvas.height / (canvas.height / scale);

      // Simpler approach: just use the offset directly
      mousePos.x = canvasX / scale;
      mousePos.y = canvasY / scale;
      mouseOverCanvas = true;
    });

    canvas.addEventListener('mouseenter', () => {
      mouseOverCanvas = true;
    });

    canvas.addEventListener('mouseleave', () => {
      mouseOverCanvas = false;
    });

    // ============= AUDIO SYSTEM =============
    let audioContext;
    let soundEnabled = true;

    function initAudio() {
      if (!audioContext) {
        try {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          console.error('AudioContext error:', e);
          return;
        }
      }
      if (audioContext && audioContext.state === 'suspended') {
        audioContext.resume().catch(err => console.error('Resume failed:', err));
      }
      return audioContext;
    }

    function playSound(type, freq = 440, duration = 0.1) {
      if (!soundEnabled) return;
      const ctx = initAudio();
      if (!ctx) return;

      try {
        if (type === 'laser') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.setValueAtTime(800, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + duration);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + duration);
        } else if (type === 'explosion') {
          const bufferSize = ctx.sampleRate * duration;
          const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
          }
          const source = ctx.createBufferSource();
          source.buffer = buffer;
          const gain = ctx.createGain();
          const filter = ctx.createBiquadFilter();
          source.connect(filter);
          filter.connect(gain);
          gain.connect(ctx.destination);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
          filter.frequency.setValueAtTime(400, ctx.currentTime);
          filter.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + duration);
          source.start(ctx.currentTime);
          source.stop(ctx.currentTime + duration);
        } else if (type === 'powerup') {
          const notes = [440, 550, 660];
          for (let i = 0; i < notes.length; i++) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(notes[i], ctx.currentTime);
            gain.gain.setValueAtTime(0.1, ctx.currentTime + i * 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.05 + 0.1);
            osc.start(ctx.currentTime + i * 0.05);
            osc.stop(ctx.currentTime + i * 0.05 + 0.1);
          }
        } else if (type === 'ufo') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.setValueAtTime(200, ctx.currentTime);
          osc.frequency.setValueAtTime(150, ctx.currentTime + duration / 2);
          osc.frequency.setValueAtTime(200, ctx.currentTime + duration);
          gain.gain.setValueAtTime(0.15, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + duration);
        }
      } catch (e) {
        console.error('Sound playback error:', e);
      }
    }

    // ============= ENTITY CLASSES =============
    class Ship {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.angle = 0;
        this.vx = 0;
        this.vy = 0;
        this.radius = 12;
        this.maxSpeed = 5;
        this.rotateSpeed = 0.2;
        this.thrustPower = 0.3;
        this.lastShotTime = 0;
        this.shootInterval = 200;
        this.alive = true;
      }

      update() {
        const rotateLeft = keys['arrowleft'] || keys['a'];
        const rotateRight = keys['arrowright'] || keys['d'];
        const thrust = keys['arrowup'] || keys['w'];

        // Use mouse control if mouse is over canvas, unless keyboard rotation is active
        if (mouseOverCanvas && !rotateLeft && !rotateRight) {
          // Calculate angle from ship to mouse position
          const dx = mousePos.x - this.x;
          const dy = mousePos.y - this.y;
          this.angle = Math.atan2(dy, dx) + Math.PI / 2;
        } else {
          // Keyboard rotation
          if (rotateLeft) this.angle -= this.rotateSpeed;
          if (rotateRight) this.angle += this.rotateSpeed;
        }

        let thrustPower = this.thrustPower;
        if (gameState.activePowerUps['speed']) {
          thrustPower *= 3;
        }

        if (thrust) {
          this.vx += Math.sin(this.angle) * thrustPower;
          this.vy += -Math.cos(this.angle) * thrustPower;

          // Add jet particles
          const jetX = this.x - Math.sin(this.angle) * 12;
          const jetY = this.y + Math.cos(this.angle) * 12;
          for (let i = 0; i < 2; i++) {
            const spreadAngle = this.angle + Math.PI + (Math.random() - 0.5) * 0.3;
            const particle = new Particle(
              jetX + (Math.random() - 0.5) * 4,
              jetY + (Math.random() - 0.5) * 4,
              Math.sin(spreadAngle) * (1 + Math.random()),
              -Math.cos(spreadAngle) * (1 + Math.random()),
              'jet'
            );
            gameState.particles.push(particle);
          }
        }

        let maxSpeed = this.maxSpeed;
        if (gameState.activePowerUps['speed']) {
          maxSpeed *= 3;
        }
        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        if (speed > maxSpeed) {
          this.vx = (this.vx / speed) * maxSpeed;
          this.vy = (this.vy / speed) * maxSpeed;
        }

        this.x += this.vx;
        this.y += this.vy;

        // Wrap around edges
        const margin = 40;
        if (this.x < -margin) this.x = CANVAS_WIDTH + margin;
        if (this.x > CANVAS_WIDTH + margin) this.x = -margin;
        if (this.y < -margin) this.y = CANVAS_HEIGHT + margin;
        if (this.y > CANVAS_HEIGHT + margin) this.y = -margin;

        this.vx *= 0.99;
        this.vy *= 0.99;
      }

      fire() {
        const now = Date.now();
        if (now - this.lastShotTime < this.shootInterval) return;
        this.lastShotTime = now;

        let projectileCount = 1;
        if (gameState.activePowerUps['rapidFire']) {
          projectileCount = 5;
        }

        for (let i = 0; i < projectileCount; i++) {
          const spread = (projectileCount - 1) * 0.1;
          const angle = this.angle - Math.PI / 2 + (i - projectileCount / 2 + 0.5) * 0.1;
          const proj = new Projectile(
            this.x + Math.cos(angle) * 15,
            this.y + Math.sin(angle) * 15,
            Math.cos(angle) * 6 + this.vx,
            Math.sin(angle) * 6 + this.vy
          );
          gameState.projectiles.push(proj);
        }
        playSound('laser');
      }

      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        // Draw ointment tube shape
        ctx.fillStyle = '#00ff88';
        ctx.strokeStyle = '#00ff88';
        ctx.lineWidth = 2;

        // Main tube body
        ctx.fillRect(-5, -12, 10, 24);

        // Pointed tip (top)
        ctx.beginPath();
        ctx.moveTo(-5, -12);
        ctx.lineTo(0, -18);
        ctx.lineTo(5, -12);
        ctx.fill();

        // Rounded cap (bottom)
        ctx.beginPath();
        ctx.arc(0, 12, 5, 0, Math.PI * 2);
        ctx.fill();

        // Stripes for detail
        ctx.strokeStyle = '#00ff88';
        for (let i = -8; i <= 8; i += 4) {
          ctx.beginPath();
          ctx.moveTo(-3, i);
          ctx.lineTo(3, i);
          ctx.stroke();
        }

        ctx.restore();
      }
    }

    class Lesion {
      constructor(x, y, size = 'large', vx = 0, vy = 0) {
        this.x = x;
        this.y = y;
        this.vx = vx || (Math.random() - 0.5) * 2;
        this.vy = vy || (Math.random() - 0.5) * 2;
        this.size = size;
        this.radius = size === 'large' ? 25 : size === 'medium' ? 12 : 6;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.05;
        this.alive = true;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.rotation += this.rotationSpeed;

        const margin = 50;
        if (this.x < -margin) this.x = CANVAS_WIDTH + margin;
        if (this.x > CANVAS_WIDTH + margin) this.x = -margin;
        if (this.y < -margin) this.y = CANVAS_HEIGHT + margin;
        if (this.y > CANVAS_HEIGHT + margin) this.y = -margin;
      }

      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);

        ctx.fillStyle = '#ff6b9d';
        ctx.strokeStyle = '#ff00ff';
        ctx.lineWidth = 2;

        // Draw bulbous lesion with bumps
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const angle = (i / 8) * Math.PI * 2;
          const bumpRadius = this.radius + Math.sin(i) * (this.radius * 0.4);
          const x = Math.cos(angle) * bumpRadius;
          const y = Math.sin(angle) * bumpRadius;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.restore();
      }

      split() {
        const newLesions = [];
        if (this.size === 'large') {
          for (let i = 0; i < 2; i++) {
            const angle = (Math.random() - 0.5) * Math.PI;
            newLesions.push(new Lesion(this.x, this.y, 'medium',
              Math.cos(angle) * 2, Math.sin(angle) * 2));
          }
        } else if (this.size === 'medium') {
          for (let i = 0; i < 2; i++) {
            const angle = (Math.random() - 0.5) * Math.PI;
            newLesions.push(new Lesion(this.x, this.y, 'small',
              Math.cos(angle) * 2.5, Math.sin(angle) * 2.5));
          }
        }
        return newLesions;
      }
    }

    class UFO {
      constructor() {
        this.x = Math.random() < 0.5 ? -30 : canvas.width + 30;
        this.y = Math.random() * canvas.height;
        this.vx = Math.random() < 0.5 ? 1.5 : -1.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.radius = 15;
        this.alive = true;
        this.shootCounter = 0;
        this.shootInterval = 120 + Math.random() * 100;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        if (this.x < -50 || this.x > canvas.width + 50) this.alive = false;

        this.shootCounter++;
        if (this.shootCounter > this.shootInterval && gameState.ship) {
          this.shoot();
          this.shootCounter = 0;
          this.shootInterval = 120 + Math.random() * 100;
        }
      }

      shoot() {
        if (!gameState.ship) return;
        const dx = gameState.ship.x - this.x;
        const dy = gameState.ship.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const vx = (dx / dist) * 3;
        const vy = (dy / dist) * 3;
        const proj = new EnemyProjectile(this.x, this.y, vx, vy);
        gameState.projectiles.push(proj);
      }

      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);

        ctx.fillStyle = '#ffaa00';
        ctx.strokeStyle = '#ffaa00';
        ctx.lineWidth = 2;

        // UFO body
        ctx.beginPath();
        ctx.ellipse(0, 0, 20, 12, 0, 0, Math.PI * 2);
        ctx.fill();

        // Dome
        ctx.beginPath();
        ctx.arc(0, -8, 8, Math.PI, 0);
        ctx.stroke();

        // Windows
        for (let i = -8; i <= 8; i += 5) {
          ctx.beginPath();
          ctx.arc(i, 3, 2, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }
    }

    class Projectile {
      constructor(x, y, vx, vy) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.radius = 3;
        this.lifetime = 2000;
        this.born = Date.now();
        this.alive = true;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        if (Date.now() - this.born > this.lifetime) this.alive = false;
        if (this.x < -10 || this.x > canvas.width + 10 ||
            this.y < -10 || this.y > canvas.height + 10) this.alive = false;
      }

      draw(ctx) {
        ctx.fillStyle = '#00ff88';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    class EnemyProjectile extends Projectile {
      draw(ctx) {
        ctx.fillStyle = '#ffaa00';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    class PowerUp {
      constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type; // 'rapidFire' or 'speed'
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.radius = 8;
        this.alive = true;
        this.rotation = 0;
        this.rotationSpeed = 0.1;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.rotation += this.rotationSpeed;

        this.vx *= 0.98;
        this.vy *= 0.98;

        if (this.x < 0 || this.x > canvas.width ||
            this.y < 0 || this.y > canvas.height) this.alive = false;
      }

      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);

        ctx.strokeStyle = this.type === 'rapidFire' ? '#ffff00' : '#00ffff';
        ctx.lineWidth = 2;

        if (this.type === 'rapidFire') {
          // Lightning bolt
          ctx.beginPath();
          ctx.moveTo(0, -10);
          ctx.lineTo(-5, -2);
          ctx.lineTo(-2, -2);
          ctx.lineTo(5, 10);
          ctx.lineTo(2, 2);
          ctx.lineTo(-2, 2);
          ctx.closePath();
          ctx.stroke();
        } else {
          // Speed icon (shoe/motion lines)
          ctx.beginPath();
          ctx.arc(0, 0, 8, 0, Math.PI * 2);
          ctx.stroke();
          for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.moveTo(-12, -5 + i * 5);
            ctx.lineTo(-6, -5 + i * 5);
            ctx.stroke();
          }
        }

        ctx.restore();
      }
    }

    class Particle {
      constructor(x, y, vx, vy, type = 'explosion') {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.lifetime = 500;
        this.born = Date.now();
        this.type = type;
        this.alive = true;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.1; // gravity

        if (Date.now() - this.born > this.lifetime) this.alive = false;
      }

      draw(ctx) {
        const age = Date.now() - this.born;
        const alpha = 1 - (age / this.lifetime);

        ctx.globalAlpha = alpha;
        if (this.type === 'explosion') {
          ctx.fillStyle = '#ff8800';
        } else if (this.type === 'jet') {
          ctx.fillStyle = '#ffff00';
        } else {
          ctx.fillStyle = '#ff00ff';
        }
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    // ============= COLLISION DETECTION =============
    function checkCollisions() {
      // Projectiles vs Lesions
      for (let i = gameState.projectiles.length - 1; i >= 0; i--) {
        const proj = gameState.projectiles[i];
        if (proj instanceof EnemyProjectile) continue;

        for (let j = gameState.entities.length - 1; j >= 0; j--) {
          const entity = gameState.entities[j];
          if (!(entity instanceof Lesion)) continue;

          const dist = Math.hypot(proj.x - entity.x, proj.y - entity.y);
          if (dist < proj.radius + entity.radius) {
            proj.alive = false;
            entity.alive = false;
            onLesionDestroyed(entity);
            break;
          }
        }
      }

      // Projectiles vs UFO
      for (let i = gameState.projectiles.length - 1; i >= 0; i--) {
        const proj = gameState.projectiles[i];
        if (proj instanceof EnemyProjectile) continue;
        if (!gameState.ufo) continue;

        const dist = Math.hypot(proj.x - gameState.ufo.x, proj.y - gameState.ufo.y);
        if (dist < proj.radius + gameState.ufo.radius) {
          proj.alive = false;
          gameState.ufo.alive = false;
          const points = 200;
          addScore(points);
          createExplosion(gameState.ufo.x, gameState.ufo.y, 4);
          playSound('explosion');
          gameState.ufo = null;
          break;
        }
      }

      // Ship vs Lesions
      if (gameState.ship) {
        for (let j = gameState.entities.length - 1; j >= 0; j--) {
          const entity = gameState.entities[j];
          if (!(entity instanceof Lesion)) continue;

          const dist = Math.hypot(gameState.ship.x - entity.x, gameState.ship.y - entity.y);
          if (dist < gameState.ship.radius + entity.radius) {
            gameState.ship.alive = false;
            entity.alive = false;
            createExplosion(gameState.ship.x, gameState.ship.y, 8);
            playSound('explosion');
            gameState.lives--;
            if (gameState.lives > 0) respawnShip();
            break;
          }
        }
      }

      // Ship vs UFO
      if (gameState.ship && gameState.ufo) {
        const dist = Math.hypot(gameState.ship.x - gameState.ufo.x, gameState.ship.y - gameState.ufo.y);
        if (dist < gameState.ship.radius + gameState.ufo.radius) {
          gameState.ship.alive = false;
          gameState.ufo.alive = false;
          createExplosion(gameState.ship.x, gameState.ship.y, 8);
          playSound('explosion');
          gameState.lives--;
          if (gameState.lives > 0) respawnShip();
          gameState.ufo = null;
        }
      }

      // Enemy projectiles vs Ship
      if (gameState.ship) {
        for (let i = gameState.projectiles.length - 1; i >= 0; i--) {
          const proj = gameState.projectiles[i];
          if (!(proj instanceof EnemyProjectile)) continue;

          const dist = Math.hypot(proj.x - gameState.ship.x, proj.y - gameState.ship.y);
          if (dist < proj.radius + gameState.ship.radius) {
            proj.alive = false;
            gameState.ship.alive = false;
            createExplosion(gameState.ship.x, gameState.ship.y, 8);
            playSound('explosion');
            gameState.lives--;
            if (gameState.lives > 0) respawnShip();
            break;
          }
        }
      }

      // Ship vs PowerUps
      if (gameState.ship) {
        for (let i = gameState.powerUps.length - 1; i >= 0; i--) {
          const pup = gameState.powerUps[i];
          const dist = Math.hypot(gameState.ship.x - pup.x, gameState.ship.y - pup.y);
          if (dist < gameState.ship.radius + pup.radius) {
            activatePowerUp(pup.type);
            pup.alive = false;
            playSound('powerup');
            createExplosion(pup.x, pup.y, 2);
            break;
          }
        }
      }
    }

    function onLesionDestroyed(lesion) {
      let points = lesion.size === 'large' ? 20 : lesion.size === 'medium' ? 50 : 100;
      if (gameState.activePowerUps['rapidFire']) points *= 2;
      addScore(points);

      const newLesions = lesion.split();
      gameState.entities.push(...newLesions);

      createExplosion(lesion.x, lesion.y, 3);
      playSound('explosion');

      if (Math.random() < 0.25) {
        const pwType = Math.random() < 0.5 ? 'rapidFire' : 'speed';
        const pw = new PowerUp(lesion.x, lesion.y, pwType);
        gameState.powerUps.push(pw);
      }

      if (gameState.entities.filter(e => e instanceof Lesion).length === 0) {
        waveCleared();
      }
    }

    function createExplosion(x, y, count) {
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        const speed = 2 + Math.random() * 2;
        const particle = new Particle(
          x + Math.cos(angle) * 5,
          y + Math.sin(angle) * 5,
          Math.cos(angle) * speed,
          Math.sin(angle) * speed
        );
        gameState.particles.push(particle);
      }
    }

    // ============= POWER-UP SYSTEM =============
    function activatePowerUp(type) {
      if (type === 'rapidFire') {
        gameState.activePowerUps['rapidFire'] = true;
        setTimeout(() => {
          gameState.activePowerUps['rapidFire'] = false;
        }, 7000);
      } else if (type === 'speed') {
        gameState.activePowerUps['speed'] = true;
        setTimeout(() => {
          gameState.activePowerUps['speed'] = false;
        }, 5000);
      }
      updatePowerUpDisplay();
    }

    function updatePowerUpDisplay() {
      const display = document.getElementById('powerUpDisplay');
      display.innerHTML = '';

      if (gameState.activePowerUps['rapidFire']) {
        const div = document.createElement('div');
        div.className = 'power-up-indicator active';
        div.textContent = '⚡ RAPID FIRE 2x';
        display.appendChild(div);
      }

      if (gameState.activePowerUps['speed']) {
        const div = document.createElement('div');
        div.className = 'power-up-indicator active';
        div.textContent = '💨 SPEED BOOST';
        display.appendChild(div);
      }
    }

    // ============= SCORING & WAVES =============
    function addScore(points) {
      gameState.score += points;
      document.getElementById('scoreDisplay').textContent = gameState.score;
    }

    function waveCleared() {
      gameState.wave++;
      gameState.asteroidCount++;
      gameState.ufoSpawnRate = Math.max(350, gameState.ufoSpawnRate - 30);
      document.getElementById('waveDisplay').textContent = gameState.wave;
      spawnWave();
    }

    function spawnWave() {
      for (let i = 0; i < gameState.asteroidCount; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        // Avoid spawn near ship
        if (gameState.ship && Math.hypot(x - gameState.ship.x, y - gameState.ship.y) < 100) {
          i--;
          continue;
        }
        gameState.entities.push(new Lesion(x, y, 'large'));
      }
    }

    function respawnShip() {
      gameState.ship = new Ship(canvas.width / 2, canvas.height / 2);
      document.getElementById('livesDisplay').textContent = gameState.lives;
    }

    // ============= LEADERBOARD =============
    function saveScore(name) {
      let leaderboard = JSON.parse(localStorage.getItem('hemorrhoids_leaderboard') || '[]');
      leaderboard.push({
        name: name || 'Anonymous',
        score: gameState.score,
        date: new Date().toLocaleDateString()
      });
      leaderboard.sort((a, b) => b.score - a.score);
      leaderboard = leaderboard.slice(0, 10);
      localStorage.setItem('hemorrhoids_leaderboard', JSON.stringify(leaderboard));
    }

    function displayLeaderboard(modal = true) {
      const leaderboard = JSON.parse(localStorage.getItem('hemorrhoids_leaderboard') || '[]');

      if (modal) {
        const list = document.getElementById('leaderboardList');
        list.innerHTML = '';
        if (leaderboard.length === 0) {
          list.innerHTML = '<div class="leaderboard-entry">No scores yet!</div>';
        } else {
          leaderboard.forEach((entry, idx) => {
            const div = document.createElement('div');
            div.className = 'leaderboard-entry';
            div.innerHTML = `
              <span class="leaderboard-rank">#${idx + 1}</span>
              <span>${entry.name}</span>
              <span>${entry.score} (${entry.date})</span>
            `;
            list.appendChild(div);
          });
        }
        document.getElementById('leaderboardModal').classList.remove('hidden');
      } else {
        // For menu display
        const div = document.getElementById('topScoresMenu');
        if (leaderboard.length === 0) {
          div.innerHTML = '<div class="score-entry">No scores yet</div>';
        } else {
          div.innerHTML = '<div class="score-entry" style="margin-bottom: 10px;">Recent Scores:</div>' +
            leaderboard.slice(0, 5).map((e, i) =>
              `<div class="score-entry">#${i+1} ${e.name}: ${e.score}</div>`
            ).join('');
        }
      }
    }

    function getRank(score) {
      const leaderboard = JSON.parse(localStorage.getItem('hemorrhoids_leaderboard') || '[]');
      for (let i = 0; i < leaderboard.length; i++) {
        if (score >= leaderboard[i].score) return i + 1;
      }
      return leaderboard.length + 1;
    }

    // ============= GAME STATES =============
    function startGame() {
      gameState.mode = 'playing';
      gameState.score = 0;
      gameState.lives = 3;
      gameState.wave = 1;
      gameState.initialWave = 1;
      gameState.asteroidCount = 4;
      gameState.entities = [];
      gameState.projectiles = [];
      gameState.particles = [];
      gameState.powerUps = [];
      gameState.activePowerUps = {};
      gameState.ufo = null;
      gameState.ufoSpawnCounter = 0;

      document.getElementById('menuOverlay').classList.add('hidden');
      document.getElementById('gameOverOverlay').classList.add('hidden');
      document.getElementById('leaderboardModal').classList.add('hidden');

      respawnShip();
      spawnWave();
      document.getElementById('scoreDisplay').textContent = '0';
      document.getElementById('livesDisplay').textContent = '3';
      document.getElementById('waveDisplay').textContent = '1';
    }

    function showMenu() {
      gameState.mode = 'menu';
      document.getElementById('menuOverlay').classList.remove('hidden');
      document.getElementById('gameOverOverlay').classList.add('hidden');
      document.getElementById('leaderboardModal').classList.add('hidden');
      displayLeaderboard(false);
    }

    function showGameOver() {
      gameState.mode = 'gameOver';
      document.getElementById('gameOverOverlay').classList.remove('hidden');
      document.getElementById('menuOverlay').classList.add('hidden');
      document.getElementById('leaderboardModal').classList.add('hidden');
      document.getElementById('finalScore').textContent = gameState.score;
      document.getElementById('finalRank').textContent = getRank(gameState.score);
      document.getElementById('playerNameInput').value = '';
      document.getElementById('playerNameInput').focus();
    }

    // ============= GAME LOOP =============
    function update() {
      if (gameState.mode === 'playing') {
        // Update entities
        if (gameState.ship) gameState.ship.update();
        for (let e of gameState.entities) if (e.alive) e.update();
        for (let p of gameState.projectiles) if (p.alive) p.update();
        for (let pu of gameState.powerUps) if (pu.alive) pu.update();
        for (let p of gameState.particles) if (p.alive) p.update();
        if (gameState.ufo) gameState.ufo.update();

        // Remove dead entities
        gameState.entities = gameState.entities.filter(e => e.alive);
        gameState.projectiles = gameState.projectiles.filter(p => p.alive);
        gameState.powerUps = gameState.powerUps.filter(p => p.alive);
        gameState.particles = gameState.particles.filter(p => p.alive);

        checkCollisions();

        // UFO spawning
        if (!gameState.ufo) {
          gameState.ufoSpawnCounter++;
          if (gameState.ufoSpawnCounter > gameState.ufoSpawnRate) {
            gameState.ufo = new UFO();
            gameState.ufoSpawnCounter = 0;
          }
        }

        // Game over check
        if (gameState.lives <= 0) {
          showGameOver();
        }
      }
    }

    function draw() {
      // Clear canvas
      ctx.fillStyle = 'rgba(10, 10, 26, 0.9)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const scaleX = canvas.width / CANVAS_WIDTH;
      const scaleY = canvas.height / CANVAS_HEIGHT;
      const scale = Math.min(scaleX, scaleY);

      ctx.save();
      ctx.scale(scale, scale);

      if (gameState.mode === 'playing' || gameState.mode === 'paused') {
        // Draw all entities
        if (gameState.ship && gameState.ship.alive) gameState.ship.draw(ctx);
        for (let e of gameState.entities) if (e.alive) e.draw(ctx);
        for (let p of gameState.projectiles) if (p.alive) p.draw(ctx);
        for (let pu of gameState.powerUps) if (pu.alive) pu.draw(ctx);
        for (let p of gameState.particles) if (p.alive) p.draw(ctx);
        if (gameState.ufo) gameState.ufo.draw(ctx);

        if (gameState.mode === 'paused') {
          ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
          ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
          ctx.fillStyle = '#00ff88';
          ctx.font = 'bold 48px Arial';
          ctx.textAlign = 'center';
          ctx.fillText('PAUSED', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
        }
      }

      ctx.restore();
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // ============= UI EVENT HANDLERS =============
    document.getElementById('startButton').addEventListener('click', () => {
      initAudio();
      startGame();
    });

    document.getElementById('playAgainButton').addEventListener('click', startGame);

    document.getElementById('menuButton').addEventListener('click', showMenu);

    document.getElementById('leaderboardButtonMenu').addEventListener('click', () => {
      displayLeaderboard(true);
    });

    document.getElementById('leaderboardButtonGameOver').addEventListener('click', () => {
      displayLeaderboard(true);
    });

    document.getElementById('leaderboardCloseButton').addEventListener('click', () => {
      document.getElementById('leaderboardModal').classList.add('hidden');
    });

    document.getElementById('submitScoreButton').addEventListener('click', () => {
      const name = document.getElementById('playerNameInput').value.trim() || 'Anonymous';
      saveScore(name);
      displayLeaderboard(true);
      // Hide input section
      document.querySelector('.game-over-stats').style.display = 'none';
      document.querySelector('.game-over-buttons').style.display = 'none';
      document.querySelectorAll('p, #playerNameInput, #submitScoreButton').forEach(e => {
        if (e.tagName === 'P' || e.id === 'playerNameInput' || e.id === 'submitScoreButton') {
          e.style.display = 'none';
        }
      });
    });

    document.getElementById('muteButton').addEventListener('click', () => {
      soundEnabled = !soundEnabled;
      const btn = document.getElementById('muteButton');
      btn.textContent = soundEnabled ? '🔊 Sound ON' : '🔇 Sound OFF';
    });

    // Resume audio context on any user interaction
    canvas.addEventListener('click', initAudio);
    document.addEventListener('click', initAudio);

    // ============= START =============
    showMenu();
    gameLoop();
  </script>
</body>
</html>
